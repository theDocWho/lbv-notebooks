name: execute-notebooks
on:
  push:
    branches: [main]
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install nbconvert ipykernel numpy pandas scikit-learn
      - name: Execute every notebook top-to-bottom
        run: |
          set -e
          for nb in ai-ml/*.ipynb; do
            echo "== $nb"
            jupyter nbconvert --to notebook --execute --stdout "$nb" > /dev/null
          done
